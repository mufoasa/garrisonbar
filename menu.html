<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet" />

<style>
/* =============================================
   CSS VARIABLES & RESET
   ============================================= */
:root {
  --black:       #0a0a0a;
  --charcoal:    #111111;
  --charcoal-2:  #1a1a1a;
  --charcoal-3:  #242424;
  --gold:        #c9a84c;
  --gold-light:  #e0c06e;
  --gold-dim:    rgba(201,168,76,0.12);
  --gold-border: rgba(201,168,76,0.28);
  --cream:       #f5efe6;
  --text-main:   #e8e0d5;
  --text-muted:  #8a8070;
  --text-dim:    #5a5248;
  --font-serif:  'Cormorant Garamond', Georgia, serif;
  --font-sans:   'Jost', sans-serif;
  --ease:        cubic-bezier(0.25, 0.46, 0.45, 0.94);
  --transition:  0.4s var(--ease);
  --glow:        0 0 40px rgba(201,168,76,0.18);
  --nav-h:       80px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--black);
  color: var(--text-main);
  font-family: var(--font-sans);
  font-weight: 300;
  line-height: 1.7;
  overflow-x: hidden;
  cursor: none;
  min-height: 100vh;
}
img { max-width: 100%; display: block; }
a  { text-decoration: none; color: inherit; }
button { cursor: none; border: none; background: none; font-family: inherit; }

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
}

/* =============================================
   CUSTOM CURSOR
   ============================================= */
#cursor {
  width: 10px; height: 10px;
  background: var(--gold);
  border-radius: 50%;
  position: fixed; top: 0; left: 0;
  pointer-events: none; z-index: 9999;
  transform: translate(-50%,-50%);
  transition: width .3s, height .3s, opacity .3s;
  mix-blend-mode: screen;
}
#cursor-ring {
  width: 36px; height: 36px;
  border: 1px solid rgba(201,168,76,.45);
  border-radius: 50%;
  position: fixed; top: 0; left: 0;
  pointer-events: none; z-index: 9998;
  transform: translate(-50%,-50%);
  transition: width .3s, height .3s;
}
body.cursor-hover #cursor      { width: 20px; height: 20px; opacity: .6; }
body.cursor-hover #cursor-ring { width: 54px; height: 54px; border-color: var(--gold); }

/* =============================================
   NAVBAR
   ============================================= */
#navbar {
  position: fixed; top: 0; left: 0; right: 0;
  height: var(--nav-h);
  z-index: 200;
  padding: 0 4rem;
  display: flex; align-items: center; justify-content: space-between;
  background: rgba(10,10,10,.92);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--gold-border);
}
.nav-logo {
  font-family: var(--font-serif);
  font-size: 1.3rem;
  letter-spacing: .2em;
  color: var(--gold);
  font-weight: 300;
}
.nav-logo em { font-style: italic; }
.nav-back {
  display: flex; align-items: center; gap: .6rem;
  font-size: .68rem; letter-spacing: .2em;
  text-transform: uppercase;
  color: var(--text-muted);
  transition: color var(--transition);
  cursor: none;
}
.nav-back svg { width: 16px; height: 16px; transition: transform var(--transition); }
.nav-back:hover { color: var(--gold); }
.nav-back:hover svg { transform: translateX(-4px); }
.nav-right {
  display: flex; align-items: center; gap: 2rem;
}
.nav-lang {
  display: flex; gap: .5rem;
}
.lang-btn {
  font-family: var(--font-sans);
  font-size: .63rem; letter-spacing: .15em;
  text-transform: uppercase;
  color: var(--text-dim);
  padding: .22rem .5rem;
  border: 1px solid transparent;
  transition: all var(--transition);
  cursor: none;
}
.lang-btn.active, .lang-btn:hover { color: var(--gold); border-color: var(--gold-border); }

/* hamburger */
.nav-hamburger {
  display: none; flex-direction: column; gap: 5px;
  width: 26px; cursor: none;
}
.nav-hamburger span { display: block; height: 1px; background: var(--gold); transition: all .3s; }

/* mobile nav overlay */
.nav-mobile {
  display: none;
  position: fixed; inset: 0;
  background: rgba(10,10,10,.97);
  backdrop-filter: blur(28px);
  z-index: 199;
  flex-direction: column; align-items: center; justify-content: center; gap: 2.5rem;
  opacity: 0; pointer-events: none;
  transition: opacity .4s;
}
.nav-mobile.open { display: flex; opacity: 1; pointer-events: all; }
.nav-mobile a {
  font-family: var(--font-serif);
  font-size: clamp(1.6rem,5vw,2.8rem);
  font-weight: 300; letter-spacing: .1em;
  color: var(--text-muted); transition: color .3s;
}
.nav-mobile a:hover { color: var(--gold); }

/* =============================================
   HERO BANNER
   ============================================= */
#menu-hero {
  position: relative;
  height: 42vh; min-height: 320px;
  margin-top: var(--nav-h);
  display: flex; align-items: center; justify-content: center;
  text-align: center; overflow: hidden;
}
.menu-hero-bg {
  position: absolute; inset: 0;
  background:
    linear-gradient(to bottom, rgba(10,10,10,.45) 0%, rgba(10,10,10,.85) 100%),
    url('https://images.unsplash.com/photo-1470337458703-46ad1756a187?w=1920&q=80&auto=format&fit=crop')
    center/cover no-repeat;
  animation: heroZoom 7s var(--ease) forwards;
}
@keyframes heroZoom { to { transform: scale(1.04); } }

.menu-hero-content { position: relative; z-index: 2; }
.menu-hero-eyebrow {
  font-size: .62rem; letter-spacing: .4em;
  text-transform: uppercase; color: var(--gold);
  display: block; margin-bottom: .9rem;
  animation: fadeUp .7s ease .3s both;
}
.menu-hero-title {
  font-family: var(--font-serif);
  font-size: clamp(2.4rem, 7vw, 5.5rem);
  font-weight: 300; line-height: 1;
  letter-spacing: .08em; color: var(--cream);
  animation: fadeUp .7s ease .55s both;
}
.menu-hero-title em { font-style: italic; color: var(--gold); }
.menu-hero-line {
  width: 0; height: 1px; margin: 1.2rem auto 0;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  animation: expandLine .9s ease .9s forwards;
}
@keyframes expandLine { to { width: 160px; } }
@keyframes fadeUp { from { opacity:0; transform:translateY(22px); } to { opacity:1; transform:none; } }

/* =============================================
   MAIN LAYOUT
   ============================================= */
#menu-page {
  max-width: 1340px;
  margin: 0 auto;
  padding: 4rem 3rem 8rem;
  display: grid;
  grid-template-columns: 240px 1fr;
  gap: 4rem;
  align-items: start;
}

/* =============================================
   SIDEBAR — category nav
   ============================================= */
.menu-sidebar {
  position: sticky;
  top: calc(var(--nav-h) + 2rem);
}
.sidebar-title {
  font-size: .58rem; letter-spacing: .35em;
  text-transform: uppercase; color: var(--gold);
  margin-bottom: 1.5rem;
  padding-bottom: .8rem;
  border-bottom: 1px solid var(--gold-border);
}
.sidebar-nav { display: flex; flex-direction: column; gap: .25rem; }
.sidebar-btn {
  display: flex; align-items: center; gap: .9rem;
  padding: .75rem 1rem;
  font-family: var(--font-sans);
  font-size: .72rem; letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--text-dim);
  border-left: 2px solid transparent;
  transition: all var(--transition);
  cursor: none; text-align: left;
}
.sidebar-btn .sb-icon { font-size: 1.05rem; opacity: .6; transition: opacity .3s; }
.sidebar-btn:hover  {
  color: var(--text-muted);
  border-left-color: rgba(201,168,76,.3);
  background: var(--gold-dim);
  padding-left: 1.3rem;
}
.sidebar-btn.active {
  color: var(--gold);
  border-left-color: var(--gold);
  background: var(--gold-dim);
}
.sidebar-btn.active .sb-icon { opacity: 1; }
.sidebar-count {
  margin-left: auto;
  font-size: .58rem; color: var(--text-dim);
  background: var(--charcoal-3);
  padding: .1rem .4rem;
  border-radius: 99px;
  min-width: 20px; text-align: center;
}
.sidebar-btn.active .sidebar-count { background: rgba(201,168,76,.2); color: var(--gold); }

/* =============================================
   CONTENT AREA
   ============================================= */
.menu-content {}

/* Category section header */
.cat-section { margin-bottom: 5rem; }
.cat-section-header {
  display: flex; align-items: center; gap: 1.4rem;
  margin-bottom: 2.5rem;
  padding-bottom: 1.4rem;
  border-bottom: 1px solid var(--charcoal-3);
  position: relative;
}
.cat-section-header::after {
  content: '';
  position: absolute; bottom: -1px; left: 0;
  width: 60px; height: 1px;
  background: var(--gold);
}
.cat-icon-large {
  width: 50px; height: 50px; flex-shrink: 0;
  border: 1px solid var(--gold-border);
  display: flex; align-items: center; justify-content: center;
  color: var(--gold); font-size: 1.3rem;
}
.cat-section-title {
  font-family: var(--font-serif);
  font-size: clamp(1.6rem, 3vw, 2.4rem);
  font-weight: 300; color: var(--cream);
  line-height: 1;
}
.cat-section-title em { font-style: italic; color: var(--gold); }
.cat-item-count {
  margin-left: auto; flex-shrink: 0;
  font-size: .6rem; letter-spacing: .25em;
  text-transform: uppercase; color: var(--text-dim);
}

/* Cards grid */
.menu-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 1.4rem;
}

/* Card */
.menu-card {
  background: var(--charcoal-2);
  border: 1px solid var(--charcoal-3);
  overflow: hidden;
  transition: transform var(--transition), box-shadow var(--transition), border-color var(--transition);
  position: relative;
}
.menu-card::after {
  content: '';
  position: absolute; inset: 0;
  border: 1px solid var(--gold-border);
  opacity: 0; pointer-events: none;
  transition: opacity var(--transition);
}
.menu-card:hover { transform: translateY(-5px); box-shadow: var(--glow); }
.menu-card:hover::after { opacity: 1; }

.menu-card-img-wrap { overflow: hidden; height: 190px; }
.menu-card-img {
  width: 100%; height: 100%;
  object-fit: cover;
  filter: brightness(.75) saturate(.65);
  transition: transform .65s var(--ease), filter .4s;
}
.menu-card:hover .menu-card-img { transform: scale(1.07); filter: brightness(.88) saturate(.9); }

/* "no image" placeholder */
.menu-card-placeholder {
  width: 100%; height: 190px;
  background: var(--charcoal-3);
  display: flex; align-items: center; justify-content: center;
  font-size: 2.2rem; color: var(--text-dim);
}

.menu-card-body { padding: 1.3rem 1.4rem 1.5rem; }
.menu-card-name {
  font-family: var(--font-serif);
  font-size: 1.15rem; font-weight: 400;
  color: var(--cream); margin-bottom: .35rem;
}
.menu-card-desc {
  font-size: .74rem; color: var(--text-dim);
  line-height: 1.6; margin-bottom: 1rem;
}
.menu-card-footer {
  display: flex; align-items: center; justify-content: space-between;
  border-top: 1px solid var(--charcoal-3);
  padding-top: .85rem;
}
.menu-card-price {
  font-family: var(--font-serif);
  font-size: 1.1rem; color: var(--gold); font-weight: 400;
}
.menu-card-tag {
  font-size: .58rem; letter-spacing: .18em;
  text-transform: uppercase; color: var(--text-dim);
  border: 1px solid var(--charcoal-3);
  padding: .18rem .5rem;
}

/* =============================================
   SCROLL REVEAL
   ============================================= */
.reveal {
  opacity: 0; transform: translateY(32px);
  transition: opacity .75s var(--ease), transform .75s var(--ease);
}
.reveal.visible { opacity: 1; transform: none; }

/* =============================================
   FOOTER
   ============================================= */
footer {
  padding: 2.5rem 4rem;
  border-top: 1px solid var(--charcoal-3);
  display: flex; align-items: center; justify-content: space-between;
  flex-wrap: wrap; gap: 1rem;
}
.footer-logo { font-family: var(--font-serif); font-size: 1.05rem; letter-spacing: .15em; color: var(--gold); }
.footer-logo em { font-style: italic; }
.footer-copy { font-size: .62rem; letter-spacing: .1em; color: var(--text-dim); }
.footer-back {
  font-size: .62rem; letter-spacing: .18em; text-transform: uppercase;
  color: var(--text-dim); transition: color var(--transition);
}
.footer-back:hover { color: var(--gold); }

/* =============================================
   RESPONSIVE
   ============================================= */
@media (max-width: 1024px) {
  #menu-page { grid-template-columns: 200px 1fr; gap: 2.5rem; padding: 3rem 2rem 6rem; }
}
@media (max-width: 768px) {
  #navbar { padding: 0 1.5rem; }
  .nav-right { gap: 1rem; }
  .nav-lang { display: none; }
  .nav-hamburger { display: flex; }

  #menu-page { grid-template-columns: 1fr; padding: 2rem 1.2rem 5rem; gap: 0; }
  .menu-sidebar { position: static; margin-bottom: 2.5rem; }
  .sidebar-nav { flex-direction: row; flex-wrap: wrap; gap: .5rem; }
  .sidebar-btn {
    border-left: none; border-bottom: 2px solid transparent;
    padding: .5rem .9rem; font-size: .62rem;
  }
  .sidebar-btn:hover  { border-left: none; border-bottom-color: rgba(201,168,76,.3); padding-left: .9rem; }
  .sidebar-btn.active { border-left: none; border-bottom-color: var(--gold); }
  .sidebar-count { display: none; }
  .menu-grid { grid-template-columns: 1fr; }
  footer { flex-direction: column; text-align: center; padding: 2rem 1.5rem; }
}
@media (max-width: 480px) {
  .menu-grid { grid-template-columns: 1fr; }
}
</style>

<script>
'use strict';

/* ─── CURSOR ─── */
const cursor     = document.getElementById('cursor');
const cursorRing = document.getElementById('cursor-ring');
let mouseX = 0, mouseY = 0, ringX = 0, ringY = 0;

document.addEventListener('mousemove', e => {
  mouseX = e.clientX; mouseY = e.clientY;
  cursor.style.left = mouseX + 'px';
  cursor.style.top  = mouseY + 'px';
});
(function loop() {
  ringX += (mouseX - ringX) * 0.12;
  ringY += (mouseY - ringY) * 0.12;
  cursorRing.style.left = ringX + 'px';
  cursorRing.style.top  = ringY + 'px';
  requestAnimationFrame(loop);
})();

function addHover(el) {
  el.addEventListener('mouseenter', () => document.body.classList.add('cursor-hover'));
  el.addEventListener('mouseleave', () => document.body.classList.remove('cursor-hover'));
}

/* ─── MOBILE NAV ─── */
let mobileOpen = false;
function toggleMobileMenu() {
  mobileOpen = !mobileOpen;
  document.getElementById('mobileNav').classList.toggle('open', mobileOpen);
  const spans = document.querySelectorAll('.nav-hamburger span');
  if (mobileOpen) {
    spans[0].style.transform = 'translateY(6px) rotate(45deg)';
    spans[1].style.opacity   = '0';
    spans[2].style.transform = 'translateY(-6px) rotate(-45deg)';
  } else {
    spans.forEach(s => { s.style.transform = ''; s.style.opacity = ''; });
  }
}
function closeMobileMenu() {
  mobileOpen = false;
  document.getElementById('mobileNav').classList.remove('open');
  document.querySelectorAll('.nav-hamburger span').forEach(s => { s.style.transform = ''; s.style.opacity = ''; });
}

/* ─── LANGUAGE ─── */
let currentLang = 'al';

function setLang(lang) {
  currentLang = lang;
  document.documentElement.lang = lang === 'al' ? 'sq' : lang;
  document.querySelectorAll('.lang-btn').forEach(b =>
    b.classList.toggle('active', b.textContent.trim().toLowerCase() === lang)
  );
  document.querySelectorAll('[data-al]').forEach(el => {
    const v = el.getAttribute('data-' + lang);
    if (v !== null) el.innerHTML = v;
  });
  renderAll();
}

/* ═══════════════════════════════════════════════
   RENDER SIDEBAR
════════════════════════════════════════════════ */
function renderSidebar() {
  const nav = document.getElementById('sidebarNav');
  nav.innerHTML = categories.map((cat, i) => {
    const count = menuData.filter(d => d.category === cat.id).length;
    return `
      <button class="sidebar-btn" data-cat="${cat.id}" onclick="scrollToSection('${cat.id}')">
        <span class="sb-icon">${cat.icon}</span>
        <span class="sb-label">${cat.label[currentLang]}</span>
        <span class="sidebar-count">${count}</span>
      </button>`;
  }).join('');
  nav.querySelectorAll('.sidebar-btn').forEach(addHover);
}

/* ═══════════════════════════════════════════════
   RENDER MENU CONTENT
════════════════════════════════════════════════ */
function renderContent() {
  const content = document.getElementById('menuContent');
  content.innerHTML = categories.map(cat => {
    const items = menuData.filter(d => d.category === cat.id);
    if (!items.length) return '';
    return `
      <section class="cat-section reveal" id="cat-${cat.id.replace(/\s/g,'-')}">
        <div class="cat-section-header">
          <div class="cat-icon-large">${cat.icon}</div>
          <div>
            <h2 class="cat-section-title">${cat.label[currentLang]}</h2>
          </div>
          <div class="cat-item-count">${items.length} ${currentLang === 'al' ? 'artikuj' : currentLang === 'mk' ? 'артикли' : 'items'}</div>
        </div>
        <div class="menu-grid">
          ${items.map(item => buildCard(item)).join('')}
        </div>
      </section>`;
  }).join('');

  // attach cursor hover + observe reveals
  content.querySelectorAll('.menu-card').forEach(addHover);
  observeReveals();
}

function buildCard(item) {
  const imgHtml = item.img
    ? `<div class="menu-card-img-wrap"><img class="menu-card-img" src="${item.img}" alt="${item.name[currentLang]}" loading="lazy" /></div>`
    : `<div class="menu-card-placeholder">${categories.find(c=>c.id===item.category)?.icon || '🍸'}</div>`;

  const catObj = categories.find(c => c.id === item.category);
  const catLabel = catObj ? catObj.label[currentLang] : item.category;

  return `
    <div class="menu-card">
      ${imgHtml}
      <div class="menu-card-body">
        <div class="menu-card-name">${item.name[currentLang]}</div>
        <div class="menu-card-desc">${item.desc[currentLang]}</div>
        <div class="menu-card-footer">
          <div class="menu-card-price">${item.price}</div>
          <div class="menu-card-tag">${catLabel}</div>
        </div>
      </div>
    </div>`;
}

/* ═══════════════════════════════════════════════
   SCROLL TO SECTION
════════════════════════════════════════════════ */
function scrollToSection(catId) {
  const el = document.getElementById('cat-' + catId.replace(/\s/g, '-'));
  if (!el) return;
  const offset = el.getBoundingClientRect().top + window.scrollY - (parseInt(getComputedStyle(document.documentElement).getPropertyValue('--nav-h')) + 24);
  window.scrollTo({ top: offset, behavior: 'smooth' });
}

/* ═══════════════════════════════════════════════
   ACTIVE SIDEBAR ON SCROLL
════════════════════════════════════════════════ */
function updateActiveSidebar() {
  const navH = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--nav-h')) + 40;
  let current = categories[0].id;

  categories.forEach(cat => {
    const el = document.getElementById('cat-' + cat.id.replace(/\s/g, '-'));
    if (!el) return;
    if (el.getBoundingClientRect().top <= navH + 20) current = cat.id;
  });

  document.querySelectorAll('.sidebar-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.cat === current);
  });
}
window.addEventListener('scroll', updateActiveSidebar, { passive: true });

/* ═══════════════════════════════════════════════
   SCROLL REVEAL
════════════════════════════════════════════════ */
function observeReveals() {
  const obs = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (e.isIntersecting) { e.target.classList.add('visible'); obs.unobserve(e.target); }
    });
  }, { threshold: 0.08 });
  document.querySelectorAll('.reveal').forEach(el => obs.observe(el));
}

/* ═══════════════════════════════════════════════
   FULL RENDER
════════════════════════════════════════════════ */
function renderAll() {
  renderSidebar();
  renderContent();
}

/* ═══════════════════════════════════════════════
   INIT
════════════════════════════════════════════════ */
document.addEventListener('DOMContentLoaded', () => {
  renderAll();
  // attach hover to static elements
  document.querySelectorAll('a, button').forEach(addHover);
});
</script>
